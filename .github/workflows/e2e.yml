name: E2E

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run E2E suite against live API
        id: e2e
        run: pytest e2e/ --no-cov -v

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `E2E failure on ${today}`;
            const body = [
              `The scheduled E2E run against marktplaats.nl/2dehands.be failed.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Likely causes: upstream API change, transient downtime, network glitch.`,
              `Investigate before assuming our code is broken.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'e2e-failure',
            });
            if (existing.length === 0) {
              await github.rest.issues.create({
                owner, repo, title, body, labels: ['e2e-failure'],
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existing[0].number,
                body: `Another failure on ${today}: ${runUrl}`,
              });
            }
